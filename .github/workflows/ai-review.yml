name: AI Code Review
'on':
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize
    - ready_for_review
  issue_comment:
    types:
    - created
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string
concurrency:
  group: "pr-agent-${{\n  github.event_name == 'workflow_dispatch' && format('dispatch-{0}',\
    \ github.run_id) ||\n  (\n    github.event_name == 'issue_comment' && (\n    \
    \  github.event.comment.body != '/review' ||\n      (\n        github.event.sender.type\
    \ == 'Bot' &&\n        github.event.sender.login != 'github-actions[bot]' &&\n\
    \        github.event.sender.login != 'ccs-reviewer[bot]'\n      )\n    )\n  )\
    \ && format('skip-{0}', github.run_id) ||\n  github.event.pull_request.number\
    \ ||\n  github.event.issue.number ||\n  github.event.inputs.pr_number ||\n  github.run_id\n\
    }}"
  cancel-in-progress: true
jobs:
  dispatch-review:
    name: Queue /review comment
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
    - name: Generate App Token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.CCS_REVIEWER_APP_ID }}
        private-key: ${{ secrets.CCS_REVIEWER_PRIVATE_KEY }}
    - name: Post /review command to the PR
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ github.event.inputs.pr_number }}
      with:
        github-token: ${{ steps.app-token.outputs.token }}
        script: "const issue_number = Number(process.env.PR_NUMBER);\nif (!Number.isInteger(issue_number)\
          \ || issue_number <= 0) {\n  core.setFailed(`Invalid PR number: ${process.env.PR_NUMBER}`);\n\
          \  return;\n}\n\nawait github.rest.issues.createComment({\n  owner: context.repo.owner,\n\
          \  repo: context.repo.repo,\n  issue_number,\n  body: '/review',\n});\n"
  pr-agent:
    name: PR-Agent Review
    if: "github.event_name != 'workflow_dispatch' && (\n  github.event_name == 'pull_request_target'\
      \ ||\n  (\n    github.event_name == 'issue_comment' &&\n    github.event.issue.pull_request\
      \ &&\n    github.event.comment.body == '/review' &&\n    (\n      contains(fromJSON('[\"\
      COLLABORATOR\",\"MEMBER\",\"OWNER\"]'), github.event.comment.author_association)\
      \ ||\n      github.event.sender.login == 'github-actions[bot]' ||\n      github.event.sender.login\
      \ == 'ccs-reviewer[bot]'\n    )\n  )\n)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      pull-requests: write
      contents: read
    env:
      OPENAI_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
      OPENAI.API_BASE: ${{ vars.AI_REVIEW_BASE_URL }}
      config.model: ${{ vars.AI_REVIEW_MODEL }}
      github_action_config.auto_review: 'true'
      github_action_config.auto_describe: 'false'
      github_action_config.auto_improve: 'false'
    steps:
    - name: Generate App Token
      id: pr-agent-app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.CCS_REVIEWER_APP_ID }}
        private-key: ${{ secrets.CCS_REVIEWER_PRIVATE_KEY }}
    - name: Run PR-Agent
      uses: qodo-ai/pr-agent@v0.34
      env:
        GITHUB_TOKEN: ${{ steps.pr-agent-app-token.outputs.token }}
