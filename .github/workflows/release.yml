name: Release
'on':
  push:
    branches:
    - main
  workflow_dispatch: null
jobs:
  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PAT_TOKEN }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: https://registry.npmjs.org
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Install dependencies
      run: bash scripts/ensure-deps.sh
    - name: Build package
      run: bun run build:all
    - name: Validate fast gate
      run: bun run validate
    - name: Test slow bucket
      run: bun run test:slow
    - name: Test CLI e2e
      env:
        CCS_E2E_SKIP_BUILD: '1'
      run: bun run test:e2e
    - name: Release
      id: release
      env:
        HUSKY: 0
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: "set +e\nOUTPUT=$(bun x semantic-release 2>&1)\nSTATUS=$?\nset -e\necho\
        \ \"$OUTPUT\"\n# Strip ANSI color codes before matching (semantic-release\
        \ outputs colored text)\nCLEAN=$(echo \"$OUTPUT\" | sed 's/\\x1b\\[[0-9;]*m//g')\n\
        if [[ \"$STATUS\" -ne 0 ]]; then\n  echo \"released=false\" >> $GITHUB_OUTPUT\n\
        \  exit \"$STATUS\"\nfi\nif echo \"$CLEAN\" | grep -q \"Published GitHub release\"\
        ; then\n  echo \"released=true\" >> $GITHUB_OUTPUT\nelse\n  echo \"released=false\"\
        \ >> $GITHUB_OUTPUT\nfi\n"
    - name: Notify Discord
      if: success() && steps.release.outputs.released == 'true'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: "if [ -z \"$DISCORD_WEBHOOK_URL\" ]; then\n  echo \"DISCORD_WEBHOOK_URL\
        \ not set, skipping\"\n  exit 0\nfi\nnode scripts/send-discord-release.cjs\
        \ production \"$DISCORD_WEBHOOK_URL\"\n"
    - name: Cleanup labels and close released issues
      if: success() && steps.release.outputs.released == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "VERSION=$(jq -r '.version' package.json)\nRELEASE_BODY=$(gh release view\
        \ \"v${VERSION}\" --repo \"${{ github.repository }}\" --json body --jq '.body'\
        \ 2>/dev/null || echo \"\")\nPREVIOUS_STABLE_TAG=$(git tag -l \"v[0-9]*.[0-9]*.[0-9]\"\
        \ --sort=-v:refname | \\\n  grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+$' | \\\n \
        \ grep -vx \"v${VERSION}\" | head -1 || echo \"\")\nRANGE=\"${PREVIOUS_STABLE_TAG:+${PREVIOUS_STABLE_TAG}..HEAD~1}\"\
        \nif [[ -z \"$RANGE\" ]]; then\n  RANGE=\"HEAD~50..HEAD~1\"\nfi\n\nCOMMIT_TEXT=$(git\
        \ log $RANGE --pretty=format:\"%s%n%b\" 2>/dev/null || true)\nPR_CANDIDATES=$(printf\
        \ '%s\\n' \"$COMMIT_TEXT\" | \\\n  grep -oE \"Merge pull request #[0-9]+|\\\
        \\(#[0-9]+\\\\)\" | \\\n  grep -oE \"[0-9]+\" | sort -u || true)\n\nPR_TEXT=\"\
        \"\nfor PR_NUM in $PR_CANDIDATES; do\n  DETAILS=$(gh pr view \"$PR_NUM\" --repo\
        \ \"${{ github.repository }}\" --json title,body --jq '.title + \"\\n\" +\
        \ (.body // \"\")' 2>/dev/null || true)\n  if [[ -n \"$DETAILS\" ]]; then\n\
        \    PR_TEXT=\"${PR_TEXT}\"$'\\n'\"${DETAILS}\"\n  fi\ndone\n\nRELEASE_ISSUES_FROM_BODY=$(printf\
        \ '%s\\n' \"$RELEASE_BODY\" | \\\n  perl -ne 'if (/(fixes|closes|resolves|refs?)(.*)/i)\
        \ { print \"$2\\n\"; }' | \\\n  grep -oE '#[0-9]+' | tr -d '#' || true)\n\
        RELEASE_ISSUES_FROM_COMMITS=$(printf '%s\\n' \"$COMMIT_TEXT\" | \\\n  perl\
        \ -ne 'if (/(fixes|closes|resolves|refs?)(.*)/i) { print \"$2\\n\"; }' | \\\
        \n  grep -oE '#[0-9]+' | tr -d '#' || true)\nRELEASE_ISSUES_FROM_PRS=$(printf\
        \ '%s\\n' \"$PR_TEXT\" | \\\n  perl -ne 'if (/(fixes|closes|resolves|refs?)(.*)/i)\
        \ { print \"$2\\n\"; }' | \\\n  grep -oE '#[0-9]+' | tr -d '#' || true)\n\
        RELEASE_ISSUES=$(printf '%s\\n%s\\n%s\\n' \\\n  \"$RELEASE_ISSUES_FROM_BODY\"\
        \ \\\n  \"$RELEASE_ISSUES_FROM_COMMITS\" \\\n  \"$RELEASE_ISSUES_FROM_PRS\"\
        \ | sort -u || true)\n\nRESOLVED_ISSUES_FROM_BODY=$(printf '%s\\n' \"$RELEASE_BODY\"\
        \ | \\\n  perl -ne 'if (/(fixes|closes|resolves)(.*)/i) { print \"$2\\n\"\
        ; }' | \\\n  grep -oE '#[0-9]+' | tr -d '#' || true)\nRESOLVED_ISSUES_FROM_COMMITS=$(printf\
        \ '%s\\n' \"$COMMIT_TEXT\" | \\\n  perl -ne 'if (/(fixes|closes|resolves)(.*)/i)\
        \ { print \"$2\\n\"; }' | \\\n  grep -oE '#[0-9]+' | tr -d '#' || true)\n\
        RESOLVED_ISSUES_FROM_PRS=$(printf '%s\\n' \"$PR_TEXT\" | \\\n  perl -ne 'if\
        \ (/(fixes|closes|resolves)(.*)/i) { print \"$2\\n\"; }' | \\\n  grep -oE\
        \ '#[0-9]+' | tr -d '#' || true)\nRESOLVED_ISSUES=$(printf '%s\\n%s\\n%s\\\
        n' \\\n  \"$RESOLVED_ISSUES_FROM_BODY\" \\\n  \"$RESOLVED_ISSUES_FROM_COMMITS\"\
        \ \\\n  \"$RESOLVED_ISSUES_FROM_PRS\" | sort -u || true)\n\nif [[ -z \"$RELEASE_ISSUES\"\
        \ ]]; then\n  echo \"No release-scoped issues found for v${VERSION}\"\n  exit\
        \ 0\nfi\n\nfor NUM in $RELEASE_ISSUES; do\n  echo \"Cleaning release state\
        \ on issue #$NUM\"\n  gh issue edit \"$NUM\" \\\n    --remove-label \"released-dev\"\
        \ \\\n    --remove-label \"pending-release\" \\\n    --repo \"${{ github.repository\
        \ }}\" 2>/dev/null || true\n\n  HAS_RELEASED=$(gh issue view \"$NUM\" --repo\
        \ \"${{ github.repository }}\" --json labels --jq '[.labels[].name | select(.\
        \ == \"released\")] | length' 2>/dev/null || echo \"0\")\n  if [[ \"$HAS_RELEASED\"\
        \ -gt 0 ]] && printf '%s\\n' \"$RESOLVED_ISSUES\" | grep -qx \"$NUM\"; then\n\
        \    gh issue close \"$NUM\" \\\n      --comment \"[bot] Closing issue because\
        \ this fix/feature is now in stable release (@latest).\" \\\n      --repo\
        \ \"${{ github.repository }}\" || true\n  fi\ndone\n"
