name: CI
'on':
  pull_request:
    branches:
    - main
    - dev
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun/install/cache
    strategy:
      fail-fast: false
      matrix:
        check:
        - name: typecheck
          cmd: bun run typecheck
        - name: lint
          cmd: bun run lint
        - name: format
          cmd: bun run format:check
    name: ${{ matrix.check.name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Restore bun package cache
      uses: actions/cache@v4
      with:
        path: '${{ env.BUN_INSTALL_CACHE_DIR }}

          '
        key: ${{ runner.os }}-bun-cache-v2-${{ hashFiles('bun.lock', 'ui/bun.lock')
          }}
    - name: Ensure dependencies
      run: bash scripts/ensure-deps.sh
    - name: Run ${{ matrix.check.name }}
      run: ${{ matrix.check.cmd }}
  build:
    runs-on: ubuntu-latest
    name: build
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun/install/cache
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Restore bun package cache
      uses: actions/cache@v4
      with:
        path: '${{ env.BUN_INSTALL_CACHE_DIR }}

          '
        key: ${{ runner.os }}-bun-cache-v2-${{ hashFiles('bun.lock', 'ui/bun.lock')
          }}
    - name: Ensure dependencies
      run: bash scripts/ensure-deps.sh
    - name: Build
      run: bun run build:all
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1
        if-no-files-found: error
  test:
    runs-on: ubuntu-latest
    name: test
    needs:
    - build
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun/install/cache
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Restore bun package cache
      uses: actions/cache@v4
      with:
        path: '${{ env.BUN_INSTALL_CACHE_DIR }}

          '
        key: ${{ runner.os }}-bun-cache-v2-${{ hashFiles('bun.lock', 'ui/bun.lock')
          }}
    - name: Ensure dependencies
      run: bash scripts/ensure-deps.sh
    - name: Download dist artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    - name: Test
      run: bun run test:all
    - name: Test CLI e2e
      env:
        CCS_E2E_SKIP_BUILD: '1'
      run: bun run test:e2e
