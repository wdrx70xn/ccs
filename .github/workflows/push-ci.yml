name: Push CI
'on':
  push:
    branches:
    - dev
concurrency:
  group: push-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun/install/cache
    strategy:
      fail-fast: false
      matrix:
        check:
        - name: typecheck
          cmd: bun run typecheck
        - name: lint
          cmd: bun run lint
        - name: format
          cmd: bun run format:check
    name: ${{ matrix.check.name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Restore bun package cache
      uses: actions/cache@v4
      with:
        path: '${{ env.BUN_INSTALL_CACHE_DIR }}

          '
        key: ${{ runner.os }}-bun-cache-v2-${{ hashFiles('bun.lock', 'ui/bun.lock')
          }}
    - name: Ensure dependencies
      run: bash scripts/ensure-deps.sh
    - name: Run ${{ matrix.check.name }}
      run: ${{ matrix.check.cmd }}
  build:
    runs-on: ubuntu-latest
    name: build
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun/install/cache
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Restore bun package cache
      uses: actions/cache@v4
      with:
        path: '${{ env.BUN_INSTALL_CACHE_DIR }}

          '
        key: ${{ runner.os }}-bun-cache-v2-${{ hashFiles('bun.lock', 'ui/bun.lock')
          }}
    - name: Ensure dependencies
      run: bash scripts/ensure-deps.sh
    - name: Build
      run: bun run build:all
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1
        if-no-files-found: error
  test:
    runs-on: ubuntu-latest
    name: test
    needs:
    - build
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun/install/cache
      FAST_TEST_BUDGET_SECONDS: '90'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Restore bun package cache
      uses: actions/cache@v4
      with:
        path: '${{ env.BUN_INSTALL_CACHE_DIR }}

          '
        key: ${{ runner.os }}-bun-cache-v2-${{ hashFiles('bun.lock', 'ui/bun.lock')
          }}
    - name: Ensure dependencies
      run: bash scripts/ensure-deps.sh
    - name: Download dist artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    - name: Test fast bucket with perf budget
      shell: bash
      run: "set -euo pipefail\n\nstart_epoch=$(date +%s)\ntest_status=0\nif bun run\
        \ test:fast; then\n  test_status=0\nelse\n  test_status=$?\nfi\nend_epoch=$(date\
        \ +%s)\nelapsed_seconds=$((end_epoch - start_epoch))\n\n{\n  echo \"### test:fast\
        \ perf budget\"\n  echo \"\"\n  echo \"- Elapsed: ${elapsed_seconds}s\"\n\
        \  echo \"- Budget: ${FAST_TEST_BUDGET_SECONDS}s\"\n} >> \"$GITHUB_STEP_SUMMARY\"\
        \n\nif (( elapsed_seconds > FAST_TEST_BUDGET_SECONDS )); then\n  echo \"::warning::test:fast\
        \ took ${elapsed_seconds}s (budget ${FAST_TEST_BUDGET_SECONDS}s) - check for\
        \ undeclared slow tests in scripts/run-test-bucket.js\"\n  echo \"- Result:\
        \ warning emitted. Check for undeclared slow tests in scripts/run-test-bucket.js.\"\
        \ >> \"$GITHUB_STEP_SUMMARY\"\nelse\n  echo \"- Result: within budget.\" >>\
        \ \"$GITHUB_STEP_SUMMARY\"\nfi\n\nexit \"$test_status\"\n"
    - name: Test slow bucket
      run: bun run test:slow
    - name: Test CLI e2e
      env:
        CCS_E2E_SKIP_BUILD: '1'
      run: bun run test:e2e
