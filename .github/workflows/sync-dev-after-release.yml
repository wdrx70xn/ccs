name: Sync Dev After Main Release
'on':
  release:
    types:
    - published
jobs:
  sync-dev:
    if: ${{ !github.event.release.prerelease && github.event.release.target_commitish
      == 'main' && startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name,
      '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PAT_TOKEN }}
    - name: Configure Git
      run: 'git config user.name "github-actions[bot]"

        git config user.email "github-actions[bot]@users.noreply.github.com"

        '
    - name: Sync dev with main
      run: "git fetch origin main dev\ngit checkout dev\n\n# Attempt merge, handle\
        \ version conflicts by taking main's versions\nif ! git merge origin/main\
        \ --no-edit -m \"chore(sync): merge main into dev after release\"; then\n\
        \  echo \"Merge conflicts detected, resolving version files...\"\n\n  # For\
        \ version files, take main's version (new stable base)\n  for file in VERSION\
        \ package.json installers/install.sh installers/install.ps1 CHANGELOG.md;\
        \ do\n    if git diff --name-only --diff-filter=U | grep -q \"^${file}$\"\
        ; then\n      git checkout --theirs \"$file\"\n      git add \"$file\"\n \
        \   fi\n  done\n\n  # Complete the merge\n  git commit --no-edit\nfi\n\ngit\
        \ push origin dev\n"
